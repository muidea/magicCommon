name: CI Pipeline

on:
  push:
    branches:
      - master
      - "feature/*"
      - "bugfix/*"
      - "hotfix/*"
  pull_request:
    branches:
      - master
      - "develop"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_DATABASE: testdb
          MYSQL_ROOT_PASSWORD: rootkit
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      postgres:
        image: docker.io/postgres:17.2-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: rootkit
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready -U postgres" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: go.sum

      - name: Install dependencies
        run: |
          go mod tidy
          go mod download

      - name: Install development tools
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run make all (build, test, lint)
        run: make all

      - name: Run MySQL specific tests
        run: go test -tags=mysql -count 1 ./...

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage.out
            coverage.html
          retention-days: 7

  quality-checks:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.24"

      - name: Run code quality checks
        run: |
          echo "=== Running comprehensive code quality checks ==="
          echo "1. Checking code format..."
          make fmt-check
          echo "2. Running go vet..."
          go vet ./...
          echo "3. Running static analysis..."
          if command -v golangci-lint >/dev/null 2>&1; then
            golangci-lint run ./...
          else
            echo "golangci-lint not installed, skipping..."
          fi
          echo "=== All quality checks completed ==="

  release-build:
    runs-on: ubuntu-latest
    needs: [build-and-test, quality-checks]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.24"

      - name: Build release binaries
        run: |
          echo "=== Building release binaries ==="
          mkdir -p dist

          # Build for Linux
          GOOS=linux GOARCH=amd64 go build -o dist/magicCommon-linux-amd64 ./...

          # Build for macOS
          GOOS=darwin GOARCH=amd64 go build -o dist/magicCommon-darwin-amd64 ./...
          GOOS=darwin GOARCH=arm64 go build -o dist/magicCommon-darwin-arm64 ./...

          # Build for Windows
          GOOS=windows GOARCH=amd64 go build -o dist/magicCommon-windows-amd64.exe ./...

          echo "Build artifacts:"
          ls -la dist/

      - name: Create release archive
        run: |
          cd dist
          tar -czf magicCommon-linux-amd64.tar.gz magicCommon-linux-amd64
          tar -czf magicCommon-darwin-amd64.tar.gz magicCommon-darwin-amd64
          tar -czf magicCommon-darwin-arm64.tar.gz magicCommon-darwin-arm64
          zip magicCommon-windows-amd64.zip magicCommon-windows-amd64.exe

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: dist/
          retention-days: 30
